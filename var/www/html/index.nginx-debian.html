<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lunarishub</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0d0d1a, #1a1a33);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #9ad0ff, #d6b3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #4a7aff;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.25s;
    }

    .btn:hover {
      background: #6b8cff;
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <header>Lunarishub</header>

  <section class="hero">
    <h1>Welcome to Lunarishub</h1>
    <p>月のように静かで、星のように広がるデジタルスペースへ。</p>
    <a href="/wp/" class="btn">Enter</a>
  </section>

  <footer>
    © 2026 Lunarishub
  </footer>

</body>
</html>
